<!DOCTYPE html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link

      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"

    <title>devChallenges.io | Minimal Blog Card</title>
